name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  release:
    env:
      GOPRIVATE: "github.com,vigilprotector.io"
      GH_ACCESS_TOKEN: ${{ secrets.PIPELINE_TOKEN }}
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Configure git for private modules
        run: git config --global url.https://$GH_ACCESS_TOKEN@github.com/.insteadOf https://github.com/

      - name: Install semantic-release
        # conventional-changelog-conventionalcommits is referenced by
        # .releaserc via `preset: "conventionalcommits"` and must be
        # installed alongside the semantic-release core — otherwise
        # commit-analyzer aborts with
        # "Cannot find module 'conventional-changelog-conventionalcommits'".
        run: npm install -g semantic-release @semantic-release/changelog @semantic-release/git @semantic-release/github @semantic-release/exec @semantic-release/commit-analyzer @semantic-release/release-notes-generator conventional-changelog-conventionalcommits

      - name: Run semantic-release
        id: semantic-release
        env:
          # PIPELINE_TOKEN is a user-PAT with full repo scope.
          # GITHUB_TOKEN (the runner default) cannot query
          # repository.commit.associatedPullRequests via the GraphQL
          # API, so semantic-release's "success" step fails with
          # "Resource not accessible by integration" even after the
          # tag + release have already been published.
          GITHUB_TOKEN: ${{ secrets.PIPELINE_TOKEN }}
        run: |
          # Extract version from semantic-release dry run
          VERSION=$(npx semantic-release --dry-run | grep "next release version is" | awk 'NF>1{print $NF}' | tail -n1)
          echo "Extracted version: $VERSION"
          
          # Run semantic-release
          npx semantic-release
          
          # Output version for next steps
          echo "new_release_version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: steps.semantic-release.outputs.new_release_version != ''
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Downcase repository name for Docker
        if: steps.semantic-release.outputs.new_release_version != ''
        # ghcr.io requires lowercase image names; ${{ github.repository }}
        # preserves the org casing ("VigilProtector/netshield") which
        # docker build then rejects ("repository name must be lowercase").
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Build Docker image with version tag
        if: steps.semantic-release.outputs.new_release_version != ''
        run: |
          VERSION=${{ steps.semantic-release.outputs.new_release_version }}
          docker build -t ghcr.io/${IMAGE_NAME}:$VERSION -f build/Dockerfile .
          docker push ghcr.io/${IMAGE_NAME}:$VERSION
