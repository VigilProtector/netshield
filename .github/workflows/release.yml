name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Configure Go for private modules
        run: |
          echo "GOPRIVATE=github.com,vigilprotector.io" >> $GITHUB_ENV
          echo "GONOSUMDB=github.com,vigilprotector.io" >> $GITHUB_ENV
          echo "GONOPROXY=github.com,vigilprotector.io" >> $GITHUB_ENV

      - name: Install semantic-release
        run: npm install -g semantic-release @semantic-release/changelog @semantic-release/git @semantic-release/github @semantic-release/exec

      - name: Run semantic-release
        id: semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Extract version from semantic-release dry run
          VERSION=$(npx semantic-release --dry-run | grep "next release version is" | awk 'NF>1{print $NF}' | tail -n1)
          echo "Extracted version: $VERSION"
          
          # Run semantic-release
          npx semantic-release
          
          # Output version for next steps
          echo "new_release_version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: steps.semantic-release.outputs.new_release_version != ''
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image with version tag
        if: steps.semantic-release.outputs.new_release_version != ''
        run: |
          VERSION=${{ steps.semantic-release.outputs.new_release_version }}
          docker build -t ghcr.io/${{ github.repository }}:$VERSION -f build/Dockerfile .
          docker push ghcr.io/${{ github.repository }}:$VERSION
