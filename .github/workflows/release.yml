name: Release

on:
  push:
    branches:
      - "main"

jobs:
  build:
    env:
      GITHUB_TOKEN: ${{ secrets.PIPELINE_TOKEN }}
      GOPRIVATE: "github.com,vigilprotector.io"
      REGISTRY: ghcr.io

    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: downcase REPO Name
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >>${GITHUB_ENV}
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - name: Configure git for private modules
        run: git config --global url.https://$GITHUB_TOKEN@github.com/.insteadOf https://github.com/
      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
      - name: install semantic-release
        run: |
          npm install --save-dev semantic-release
          npm install --save-dev @semantic-release/git
          npm install --save-dev @semantic-release/exec
          npm install --save-dev @semantic-release/changelog
          npm install --save-dev @semantic-release/release-notes-generator
          npm install --save-dev @semantic-release/github
          npm install --save-dev @semantic-release/commit-analyzer
          npm install --save-dev conventional-changelog-conventionalcommits
      - name: run semantic release
        id: semantic
        run: |
          VERSION=`npx semantic-release --dry-run | grep "next release" | awk 'NF>1{print $NF}'`
          echo $VERSION
          npx semantic-release
          echo "new_release_version=$VERSION" >> $GITHUB_OUTPUT
      - name: Setup Docker buildx
        if: steps.semantic.outputs.new_release_version != ''
        uses: docker/setup-buildx-action@v3
      - name: Log into registry
        if: steps.semantic.outputs.new_release_version != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.PIPELINE_TOKEN }}
      - name: Extract Docker metadata
        if: steps.semantic.outputs.new_release_version != ''
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      - name: Build and push Docker image
        if: steps.semantic.outputs.new_release_version != ''
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/Dockerfile
          build-args: |
            version=${{ steps.semantic.outputs.new_release_version }}
          secrets: |
            github_token=${{ secrets.PIPELINE_TOKEN }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.semantic.outputs.new_release_version }}
          labels: ${{ steps.meta.outputs.labels }}
          github-token: ${{ secrets.PIPELINE_TOKEN }}
